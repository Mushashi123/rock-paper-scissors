<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rock | Paper | Scissors</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/index.js" defer></script>
  </head>
  <body>
    <main class="game">
      <div class="container">
        <div class="section-top">
          <div class="computer-choice"></div>
        </div>
        <div class="section-between">
          <h1 class="h-main">Let's Play!</h1>
          <!-- <div class="stats">
            <h2 class="stats__info">Its a Draw</h2>
            <button type="button" class="stats__btn">Play Again</button>
          </div> -->
        </div>
        <div class="section-bottom">
          <div class="options">
            <h3 class="options__heading">Pick an Option:</h3>
            <div class="weapons">
              <button type="button" class="weapon-item">
                <img
                  src="../images/opt-rock.svg"
                  alt="rock"
                  class="weapons__img"
                />
              </button>
              <button type="button" class="weapon-item">
                <img
                  src="../images/opt-paper.svg"
                  alt="paper"
                  class="weapons__img"
                />
              </button>
              <button type="button" class="weapon-item">
                <img
                  src="../images/opt-scissor.svg"
                  alt="scissor"
                  class="weapons__img"
                />
              </button>
            </div>
          </div>
          <!-- <div class="player-choice">
            <img
              src="../images/paper.svg"
              alt="paper"
              class="player-choice__img"
            />
          </div> -->
        </div>
      </div>
    </main>
  </body>
</html>
